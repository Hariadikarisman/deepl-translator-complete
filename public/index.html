<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
  <title>Haka Translator</title>
  <!-- Apple Mobile Web App specific styling for true home-screen feel -->
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <div class="app-container">

    <!-- SPLIT WORKSPACE -->
    <main class="split-workspace">

      <!-- TOP HALF: SOURCE CARD (Blue iOS Layout) -->
      <section class="pane-source" id="sourcePane">
        
        <!-- HEADER BAR inside top half -->
        <header class="header-bar">
  <!-- Tombol History (kiri) -->
  <button class="header-btn" id="historyBtn" aria-label="Riwayat Terjemahan">
    <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"/>
      <path d="M3 3v5h5"/>
      <path d="M12 7v5l4 2"/>
    </svg>
  </button>
  
  <h1 class="header-title">Haka translator</h1>
  
  <!-- Tombol Favorit (kanan) -->
  <button class="header-btn" id="favoriteBtn" aria-label="Favorit">
    <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/>
    </svg>
  </button>
</header>

        <!-- Dynamic Content Textarea for text entry -->
        <div class="content-area" style="position:relative;">
            <textarea class="textarea-source size-large" id="sourceText" placeholder="Masukan Kata / Kalimat" maxlength="500" enterkeyhint="done" autocomplete="off" autocapitalize="off" spellcheck="false"></textarea>
            <button id="clearTextBtn" class="clear-text-btn" aria-label="Hapus teks">✕</button>
        </div>

        <!-- Bottom Action Bar inside source card -->
        <footer class="control-bar">
          <div class="control-group-left">
            <button class="control-btn" id="speakSourceBtn" aria-label="Dengarkan asal">
              <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"/>
                <path d="M15.54 8.46a5 5 0 0 1 0 7.07"/>
                <path d="M19.07 4.93a10 10 0 0 1 0 14.14"/>
              </svg>
            </button>
            <button class="control-btn" id="copySourceBtn" aria-label="Salin asal">
              <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <rect width="14" height="14" x="8" y="8" rx="2" ry="2"/>
                <path d="M4 16c-1.1 0-2-.9-2-2V4c0-1.1.9-2 2-2h10c1.1 0 2 .9 2 2"/>
              </svg>
            </button>
            <button class="control-btn" id="copySourceBtn" aria-label="Salin asal">
              <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <rect width="14" height="14" x="8" y="8" rx="2" ry="2"/>
                <path d="M4 16c-1.1 0-2-.9-2-2V4c0-1.1.9-2 2-2h10c1.1 0 2 .9 2 2"/>
              </svg>
            </button>
            <button class="control-btn" id="cameraTranslateBtn" aria-label="Translate dari foto">
              <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M14.5 4h-5L7 7H4a2 2 0 0 0-2 2v9a2 2 0 0 0 2 2h16a2 2 0 0 0 2-2V9a2 2 0 0 0-2-2h-3l-2.5-3z"/>
                <circle cx="12" cy="13" r="3.5"/>
              </svg>
            </button>
          </div>

          <div class="control-group-right">
            <!-- Selected Source Language Chip selector -->
            <div class="lang-selector-pill" id="sourceLangPill">
              <span class="flag" id="sourceLangFlag">🇰🇷</span>
              <span class="name" id="sourceLangName">Korean</span>
              <span class="chevron">▼</span>
            </div>

            <!-- Speech to Text microphone circular button -->
            <button class="mic-action-btn" id="voiceInputBtn" aria-label="Masukan suara">
              <!-- Mic SVG -->
              <svg class="mic-icon-svg" xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                <path d="M12 2a3 3 0 0 0-3 3v7a3 3 0 0 0 6 0V5a3 3 0 0 0-3-3Z"/>
                <path d="M19 10v1a7 7 0 0 1-14 0v-1"/>
                <line x1="12" y1="19" x2="12" y2="22"/>
              </svg>
              <!-- Glowing animated bars waveform shown when listening -->
              <div class="waveform-container">
                <div class="wave-bar"></div>
                <div class="wave-bar"></div>
                <div class="wave-bar"></div>
                <div class="wave-bar"></div>
                <div class="wave-bar"></div>
              </div>
            </button>
          </div>
        </footer>

      </section>

      <!-- FLOATING SWAP BUTTON (Dividing the screen halves perfectly) -->
      <div class="center-swap-container">
        <button class="swap-btn-circle" id="swapBtn" aria-label="Tukar bahasa">
          <!-- Double up down chevron swap icon -->
          <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
            <path d="m3 16 4 4 4-4"/>
            <path d="M7 20V4"/>
            <path d="m21 8-4-4-4 4"/>
            <path d="M17 4v16"/>
          </svg>
        </button>
      </div>

      <!-- BOTTOM HALF: TARGET CARD (Charcoal Premium iOS Layout) -->
      <section class="pane-target" id="targetPane">
        
        <!-- Translation Output Area -->
        <div class="content-area">
          <div class="target-result-wrapper">
            <div class="translation-display size-large translation-placeholder" id="targetText">
              Hasil Terjemahan
            </div>
            <div class="romanization-display" id="targetRomanization"></div>
          </div>
        </div>

        <!-- Bottom Action Bar inside target card -->
        <footer class="control-bar">
          <div class="control-group-left">
            <button class="control-btn" id="speakTargetBtn" aria-label="Dengarkan hasil">
              <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"/>
                <path d="M15.54 8.46a5 5 0 0 1 0 7.07"/>
                <path d="M19.07 4.93a10 10 0 0 1 0 14.14"/>
              </svg>
            </button>
            <button class="control-btn" id="copyTargetBtn" aria-label="Salin hasil">
              <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <rect width="14" height="14" x="8" y="8" rx="2" ry="2"/>
                <path d="M4 16c-1.1 0-2-.9-2-2V4c0-1.1.9-2 2-2h10c1.1 0 2 .9 2 2"/>
              </svg>
            </button>
          </div>

          <div class="control-group-right">
            <!-- Selected Target Language Chip selector -->
            <div class="lang-selector-pill" id="targetLangPill">
              <span class="flag" id="targetLangFlag">🇺🇸</span>
              <span class="name" id="targetLangName">English</span>
              <span class="chevron">▼</span>
            </div>
          </div>
        </footer>

      </section>

    </main>

    <!-- ==================== SCREEN: HISTORY & FAVORITES OVERLAY ==================== -->
    <div class="overlay-screen" id="historyOverlay">
      <!-- Header inside overlay -->
      <header class="overlay-header">
        <button class="back-text-btn" id="backFromHistoryBtn">
          <!-- Left arrow icon -->
          <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
            <path d="m15 18-6-6 6-6"/>
          </svg>
          Kembali
        </button>
        
        <h2 class="overlay-title">History & Favourite</h2>
        
        <button class="overlay-action-btn" id="clearHistoryBtn" title="Hapus semua riwayat">
          <!-- Trash can icon -->
          <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M3 6h18"/>
            <path d="M19 6v14c0 1-1 2-2 2H7c-1 0-2-1-2-2V6"/>
            <path d="M8 6V4c0-1 1-2 2-2h4c1 0 2 1 2 2v2"/>
          </svg>
        </button>
      </header>

      <!-- Segmented Tab Category Filter -->
      <div class="segmented-control-container">
        <div class="segmented-control">
          <button class="segment-btn active" id="tabHistory">History</button>
          <button class="segment-btn" id="tabFavourite">Favourite</button>
        </div>
      </div>

      <!-- Real-time filtering Search Bar -->
      <div class="search-bar-container">
        <form class="search-input-wrapper" onsubmit="event.preventDefault();">
          <svg class="search-icon-svg" xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
            <circle cx="11" cy="11" r="8"/>
            <path d="m21 21-4.3-4.3"/>
          </svg>
          <input type="text" class="search-input" id="historySearchInput" placeholder="Cari kata kunci..." autocomplete="off" />
          <button type="button" class="search-clear-btn" id="searchClearBtn">
            <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <line x1="18" y1="6" x2="6" y2="18"/>
              <line x1="6" y1="6" x2="18" y2="18"/>
            </svg>
          </button>
        </form>
      </div>

      <!-- Scrollable History List -->
      <div class="history-scroll-area" id="historyListContainer">
        <!-- Will be populated dynamically via JavaScript -->
      </div>
    </div>

    <!-- ==================== SHEET: BOTTOM DRAWER LANGUAGE SELECTOR ==================== -->
    <div class="bottom-sheet" id="languageSheet">
      <div class="bottom-sheet-backdrop" id="sheetBackdrop"></div>
      
      <div class="bottom-sheet-drawer">
        <div class="bottom-sheet-indicator"></div>
        
        <header class="bottom-sheet-header">
          <h3 class="bottom-sheet-title" id="sheetTitle">Pilih Bahasa</h3>
          <button class="bottom-sheet-close" id="closeSheetBtn">
            <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
              <line x1="18" y1="6" x2="6" y2="18"/>
              <line x1="6" y1="6" x2="18" y2="18"/>
            </svg>
          </button>
        </header>

        <!-- Search bar inside language bottom drawer for fast filtering -->
        <div class="bottom-sheet-search">
          <div class="search-input-wrapper">
            <svg class="search-icon-svg" xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
              <circle cx="11" cy="11" r="8"/>
              <path d="m21 21-4.3-4.3"/>
            </svg>
            <input type="text" class="search-input" id="langSearchInput" placeholder="Cari bahasa..." autocomplete="off" />
          </div>
        </div>

        <!-- Scrollable list of 30+ premium languages -->
        <div class="bottom-sheet-list" id="languageListContainer">
          <!-- Populated dynamically via JS -->
        </div>
      </div>
    </div>

    <!-- ==================== GLOBAL FLOATING TOAST ==================== -->
    <div class="global-toast" id="globalToast">
      <!-- Success checkmark icon -->
      <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round">
        <polyline points="20 6 9 17 4 12"/>
      </svg>
      <span id="toastMessage">Teks disalin ke papan klip!</span>
    </div>

  </div>

  <script type="module" src="script.js"></script>
</body>
</html>
